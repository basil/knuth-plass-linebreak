---
name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Install Playwright
        run: yarn playwright install --with-deps chromium
      - name: Check Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.1.0
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
      - name: Test
        run: yarn test
